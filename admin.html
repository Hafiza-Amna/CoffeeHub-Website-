<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Coffee HUB Orders</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-header h1 {
            font-size: 2.5rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .admin-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .orders-grid {
            display: grid;
            gap: 20px;
        }

        .order-card {
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(196,155,99,0.1);
            box-shadow: 0 10px 30px var(--shadow);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(196,155,99,0.2);
        }

        .order-id {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
        }

        .order-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .customer-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            background: rgba(196,155,99,0.1);
            padding: 12px 15px;
            border-radius: 8px;
        }

        .info-label {
            font-weight: bold;
            color: var(--accent);
            font-size: 0.9rem;
            display: block;
            margin-bottom: 5px;
        }

        .info-value {
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .order-items {
            margin-bottom: 20px;
        }

        .order-items h3 {
            color: var(--text-primary);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .item-list {
            display: grid;
            gap: 10px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .item-name {
            font-weight: bold;
            color: var(--text-primary);
        }

        .item-details {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .order-total {
            text-align: right;
            padding-top: 15px;
            border-top: 2px solid var(--accent);
        }

        .total-amount {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
            border-radius: 10px;
            margin: 20px 0;
        }

        .refresh-btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(196,155,99,0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(196,155,99,0.1);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">☕ Coffee HUB Admin</div>
        <ul id="navLinks">
            <li><a href="home.html">← Back to Site</a></li>
        </ul>
        <button id="theme-toggle" class="theme-btn">🌙</button>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1>Order Management</h1>
            <p>View and manage all customer orders</p>
        </div>

        <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh Orders</button>

        <div class="stats" id="stats">
            <!-- Stats will be populated by JavaScript -->
        </div>

        <div class="orders-grid" id="orders">
            <div class="loading">Loading orders...</div>
        </div>
    </div>

    <script src="css/js/script.js"></script>
    <script>
        // API configuration
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : 'https://your-backend-url.herokuapp.com'; // Replace with your deployed backend URL

        async function loadOrders() {
            const ordersContainer = document.getElementById('orders');
            const statsContainer = document.getElementById('stats');

            ordersContainer.innerHTML = '<div class="loading">Loading orders...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/orders`);
                const orders = await response.json();

                if (orders.length === 0) {
                    ordersContainer.innerHTML = '<div class="loading">No orders found yet.</div>';
                    return;
                }

                // Calculate stats
                const totalOrders = orders.length;
                const totalRevenue = orders.reduce((sum, order) => sum + order.total, 0);
                const totalItems = orders.reduce((sum, order) =>
                    sum + order.items.reduce((itemSum, item) => itemSum + item.quantity, 0), 0);

                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <span class="stat-number">${totalOrders}</span>
                        <span class="stat-label">Total Orders</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number">$${totalRevenue.toFixed(2)}</span>
                        <span class="stat-label">Total Revenue</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number">${totalItems}</span>
                        <span class="stat-label">Items Sold</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number">$${(totalRevenue/totalOrders).toFixed(2)}</span>
                        <span class="stat-label">Avg Order Value</span>
                    </div>
                `;

                // Display orders
                ordersContainer.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="order-id">Order #${order._id.slice(-8).toUpperCase()}</div>
                            <div class="order-date">${new Date(order.createdAt).toLocaleString()}</div>
                        </div>

                        <div class="customer-info">
                            <div class="info-item">
                                <span class="info-label">Customer Name</span>
                                <span class="info-value">${order.customerName}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Email</span>
                                <span class="info-value">${order.email}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Address</span>
                                <span class="info-value">${order.address}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Phone</span>
                                <span class="info-value">${order.phone || 'Not provided'}</span>
                            </div>
                        </div>

                        <div class="order-items">
                            <h3>Order Items</h3>
                            <div class="item-list">
                                ${order.items.map(item => `
                                    <div class="item">
                                        <div>
                                            <span class="item-name">${item.name}</span>
                                            <span class="item-details">$${item.price} each</span>
                                        </div>
                                        <div class="item-quantity">
                                            Quantity: ${item.quantity}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="order-total">
                            <div class="total-amount">Total: $${order.total.toFixed(2)}</div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                ordersContainer.innerHTML = '<div class="error">Error loading orders. Please check if the server is running.</div>';
                console.error('Error loading orders:', error);
            }
        }

        // Load orders when page loads
        window.onload = loadOrders;

        // Auto refresh every 30 seconds
        setInterval(loadOrders, 30000);
    </script>
</body>
</html>
